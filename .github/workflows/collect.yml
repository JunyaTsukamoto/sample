# 毎朝7時(JST)の記事収集をサーバー側で自動実行する (spec §2)。
# GitHub Actions はクラウド上で動くため、ブラウザ/PWAを閉じていても実行される。
name: collect-news

on:
  schedule:
    - cron: '0 22 * * *'   # 07:00 JST
    - cron: '15 22 * * *'  # 07:15 JST（再実行）
    - cron: '30 22 * * *'  # 07:30 JST（再実行）
    - cron: '0 23 * * *'   # 08:00 JST（再実行）
  workflow_dispatch:
    inputs:
      force:
        description: '同日でも強制的に再収集する'
        type: boolean
        default: true

concurrency:
  group: collect-news
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
      APP_TIMEZONE: Asia/Tokyo
      USE_MOCK_DATA: 'false'
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: 情報源をシード（初回のみ追加）
        run: npm run seed
      - name: 記事収集を実行
        # 手動実行(force=true)なら強制再収集。定期実行は同日重複を防止。
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            npm run collect -- --force
          else
            npm run collect
          fi
      - name: 更新データをコミット
        run: |
          git config user.name "kizuki-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ public/data/ || true
          if git diff --cached --quiet; then
            echo "変更なし（収集スキップまたは新規記事なし）"
          else
            git commit -m "chore(collect): 自動収集 $(date +'%Y-%m-%d %H:%M JST')"
            git push
          fi
